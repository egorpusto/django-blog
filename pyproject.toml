[tool.black]
line-length = 88
target-version = ["py312"]
exclude = '''
/(
    migrations
  | venv
  | staticfiles
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip = ["migrations", "venv"]
known_django = ["django"]
known_third_party = ["taggit", "decouple"]
sections = ["FUTURE", "STDLIB", "DJANGO", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]
