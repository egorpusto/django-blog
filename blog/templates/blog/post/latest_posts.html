<ul class="list-unstyled mb-0">
    {% for post in latest_posts %}
        <li class="mb-2">
            <a href="{{ post.get_absolute_url }}" class="text-decoration-none">
                {{ post.title }}
            </a>
            <br>
            <small class="text-muted">{{ post.publish|date:"N j, Y" }}</small>
        </li>
    {% endfor %}
</ul>
